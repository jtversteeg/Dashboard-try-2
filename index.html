<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- ✅ FIXED: proper YAML parser include -->
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

<style>
 * { box-sizing: border-box; }
 body {
  margin: 0;
  background: white;
  font-family: Arial, sans-serif;
 }

 .dashboard {
  width: 1280px;
  height: 400px;
  display: flex;
  gap: 10px;
  padding: 10px;
 }

 .column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
 }

 .box {
  background: #0078d4;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 8px;
 }

 .top-60 { flex: 6; }
 .bottom-40 { flex: 4; }
 .full { flex: 1; }

 .slider {
  flex: 1;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
 }

 .slides {
  display: flex;
  width: 200%;
  height: 100%;
  transition: transform 0.4s ease-in-out;
 }

 .slide {
  width: 50%;
  background: #0078d4;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
 }

 .dots {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
 }

 .dot {
  width: 10px;
  height: 10px;
  margin: 0 5px;
  display: inline-block;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
 }

 .dot.active {
  background: white;
 }
</style>
</head>

<body>

<div class="dashboard">

 <!-- Column 1 -->
 <div class="column">
  <div class="box top-60">Panel 1</div>
  <div class="box bottom-40">Panel 2</div>
 </div>

 <!-- Column 2 -->
 <div class="column">
  <div class="box full" id="panel3">Loading pomodoro...</div>
 </div>

 <!-- Column 3 -->
 <div class="column">
  <div class="slider" id="slider">
   <div class="slides">
    <div class="slide">Panel 4</div>
    <div class="slide">Panel 5</div>
   </div>
   <div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
   </div>
  </div>
 </div>

</div>

<script>
 const slider = document.getElementById("slider");
 const slides = slider.querySelector(".slides");
 const dots = slider.querySelectorAll(".dot");

 let index = 0;
 let startX = 0;
 let endX = 0;

 function updateSlider() {
  slides.style.transform = `translateX(-${index * 50}%)`;
  dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
 }

 function handleSwipe() {
  if (startX - endX > 50) index = 1;
  if (endX - startX > 50) index = 0;
  updateSlider();
 }

 slider.addEventListener("touchstart", e => startX = e.touches[0].clientX);
 slider.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
 });

 slider.addEventListener("mousedown", e => startX = e.clientX);
 slider.addEventListener("mouseup", e => {
  endX = e.clientX;
  handleSwipe();
 });

 async function loadPomodoroYAML() {
  try {
   const response = await fetch("pomodoro.yaml");
   if (!response.ok) throw new Error("File not found");

   const text = await response.text();
   const data = jsyaml.load(text);

   document.getElementById("panel3").innerHTML = `
    <div style="text-align:center; padding:10px; width:100%;">
      <h3>Pomodoro</h3>
      <div>Work: ${data.timer?.work ?? "-"} min</div>
      <div>Break: ${data.timer?.break ?? "-"} min</div>
      <div>Status: ${data.status ?? "unknown"}</div>
    </div>
   `;
  } catch (error) {
   document.getElementById("panel3").innerHTML =
    "<div style='padding:10px'>❌ Failed to load pomodoro.yaml</div>";
  }
 }

 loadPomodoroYAML();
</script>

</body>
</html>
